<!DOCTYPE html>
<html>
<head>
    <title>Kalkulator Jujur</title>
    <style>
        body { text-align: center; font-family: sans-serif; margin-top: 50px; background-color: #f0f0f0; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #238636; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Kalkulator Super Canggih</h1>
    <p>Masukkan angka sesukamu, hasilnya pasti mengejutkan.</p>
    <input type="number" id="num" placeholder="Angka apa aja...">
    <button onclick="hitung()">HITUNG!</button>
    <h2 id="hasil"></h2>

    <script>
        function hitung() {
            const jawaban = [
                "Hasilnya adalah... Capek ah ngitung mulu.",
                "Eits, bayar dulu baru dikasih tau!",
                "Error: Otak kalkulator sedang istirahat.",
                "Hasilnya 11, tapi bohong!",
                "Coba tanya Google saja, jangan tanya saya."
            ];
            const random = jawaban[Math.floor(Math.random() * jawaban.length)];
            document.getElementById('hasil').innerText = random;
        }
    </script>
</body>
</html>
